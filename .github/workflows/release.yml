name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to build
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - name: macOS Intel
            platform: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - name: Linux x64
            platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""
          - name: Windows x64
            platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.release_tag || github.ref }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust builds
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload installers
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.release_tag || github.ref_name }}
          releaseName: llmgui ${{ inputs.release_tag || github.ref_name }}
          releaseBody: |
            First functional llmgui release.

            - Multi-turn OpenAI, Anthropic, and Google chat
            - Persistent history and reusable system prompts
            - Markdown, LaTeX, syntax highlighting, and text attachments

            These installers are unsigned. Windows SmartScreen or macOS Gatekeeper may display a warning.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }} --ignore-version-mismatches
